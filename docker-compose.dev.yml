services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: uvicorn backend.main:app --reload --host 0.0.0.0 --port 8080
    volumes:
      - .:/code
    ports:
      - "8080:8080"
    environment:
      - ENABLE_REPLACEMENT_LOGGING=${ENABLE_REPLACEMENT_LOGGING:-false}
      - CORS_ORIGINS=http://localhost:5173
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - api
    restart: unless-stopped
