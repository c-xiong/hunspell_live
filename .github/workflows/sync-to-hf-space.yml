# Sync this repository to the Hugging Face Space that runs the public demo.
# GitHub stays the source of truth; every push to main force-updates the Space.
#
# One-time setup (repository settings):
#   - Secret  HF_TOKEN     a Hugging Face token with write access to the Space
#   - Variable HF_USERNAME your Hugging Face username (e.g. imred42)
#   - Variable HF_SPACE_ID the Space id (e.g. imred42/hunspell-live)
#
# Note: Hugging Face requires Git LFS for files larger than 10 MB. Several
# bundled .dic files exceed that, so before the first sync those files must
# be tracked with LFS (git lfs migrate) or the push will be rejected.

name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Swap in the Space card README
        run: |
          cp deploy/hf-space/README.md README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: use Space card README"

      - name: Push to the Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            "https://${{ vars.HF_USERNAME }}:${HF_TOKEN}@huggingface.co/spaces/${{ vars.HF_SPACE_ID }}" \
            HEAD:main
